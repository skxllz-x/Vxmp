<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vxmp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background -->
    <div class="background"></div>

    <!-- Music Control Button (Top Right) -->
    <div class="music-control">
        <button id="musicBtn" class="music-btn" title="Click to play/pause music">
            <i class="fas fa-play"></i>
        </button>
        <audio id="audioPlayer"></audio>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Logo/Crest -->
        <div class="logo-section">
            <img id="logo" src="logo.png" alt="Logo" class="logo">
        </div>

        <!-- Buttons Section -->
        <div class="buttons-section">
            <a href="https://discord.com" id="discordBtn" class="action-btn discord-btn" target="_blank">
                <i class="fab fa-discord"></i>
                <span>Join Discord</span>
            </a>

            <a href="https://www.roblox.com" id="robloxBtn" class="action-btn roblox-btn" target="_blank">
                <i class="fab fa-roblox"></i>
                <span>Play Game</span>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
